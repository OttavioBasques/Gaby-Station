- type: gameMap
  id: Niver
  mapName: 'Niver'
  mapPath: /Maps/_Gabystation/niver.yml
  minPlayers: 0
  stations:
    Niver:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Feliz Aniversario Gaby Station {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: 'G'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency_meta.yml
        - type: StationJobs
          availableJobs:
            Passenger: [ -1, -1 ]
            StationAi: [ 1, 1 ]
            Borg: [ -1, -1 ]
