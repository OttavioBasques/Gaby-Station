            Chemist: [ -1, -1 ]
            Paramedic: [ -1, -1 ]
            MedicalDoctor: [ -1, -1 ]
            Psychologist: [ -1, -1 ]
            MedicalIntern: [ -1, -1 ]
            Geneticist: [ -1, -1 ]
