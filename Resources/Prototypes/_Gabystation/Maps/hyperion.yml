- type: gameMap
  id: Hyperion
  mapName: 'Hyperion'
  mapPath: /Maps/_Gabystation/hyperion.yml
  minPlayers: 10
  maxPlayers: 120
  stations:
    Hyperion:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Hyperion {1}'
          nameGenerator:
