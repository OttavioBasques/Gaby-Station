            SecurityOfficer: [ -1, -1 ]
            SecurityCadet: [ -1, -1 ]
            Lawyer: [ -1, -1 ]
            PermaPrisoner: [ -1, -1 ]
            Brigmedic: [ -1, -1 ]
            PrisonGuard: [ -1, -1 ]
            #supply
            Quartermaster: [ 1, 1 ]
