            Bartender: [ -1, -1 ]
            Botanist: [ -1, -1 ]
            Chef: [ -1, -1 ]
            Janitor: [ -1, -1 ]
            Chaplain: [ -1, -1 ]
            Librarian: [ -1, -1 ]
            ServiceWorker: [ -1, -1 ]
            #engineering
            ChiefEngineer: [ 1, 1 ]
            AtmosphericTechnician: [ -1, -1 ]
            StationEngineer: [ -1, -1 ]
            TechnicalAssistant: [ -1, -1 ]
            #medical
