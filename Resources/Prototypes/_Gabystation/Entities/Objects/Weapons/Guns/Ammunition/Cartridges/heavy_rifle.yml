- type: entity
  id: CartridgeChesterRifleEMP
  name: cartridge (.315 rifle EMP)
  parent: BaseCartridgeChesterRifleProjectile
  description: A powerful cartridge used by the Chester lever rifle. The .315 EMP ammunition replaces the lead core of the bullet with a miniaturized EMP head, only possible thanks to the Bluespace technology.
  components:
  - type: CartridgeAmmo
    proto: BulletChesterRifleEMP
  - type: Sprite
