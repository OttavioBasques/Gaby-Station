- type: entity
  id: SWSShot
  name: SWS Shot
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  components:
  - type: Sprite
    sprite: _Gabystation/Objects/Weapons/Guns/Projectiles/SWSRifle.rsi
    layers:
    - state: effect_pulse
      shader: unshaded
  - type: Projectile
    impactEffect: ImpactSWS
    damage:
      types:
        Slash: 6


- type: entity
  id: PlasmaCut
  name: plasma cut
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  components:
  - type: Sprite
    sprite: _Gabystation/Objects/Weapons/Guns/Projectiles/eletricplasma.rsi
    layers:
    - state: eletric_shot
      shader: unshaded
  - type: GatheringProjectile
  - type: Projectile
    impactEffect: ImpactPlasmaCut
    damage:
      types:
        Slash: 15
        Heat: 6
        Structural: 45

- type: entity
  name: healing projectile
  id: HealingProjectile
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Reflective
    reflective:
    - Energy
  - type: FlyBySound
    sound:
      collection: EnergyMiss
      params:
        volume: 5
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: omnilaser
      shader: unshaded
  - type: Ammo
  - type: Physics
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        mask:
        - Opaque
  - type: Projectile
    impactEffect: BulletImpactEffectDisabler
    damage:
      types:
        Blunt: -5
        Piercing: -5
        Slash: -5
        Heat: -5
        Cold: -5
        Caustic: -1
        Shock: -5
        Ion: -3
    ignoreResistances: true
    soundHit:
      collection: WeakHit
  - type: RefillableSolution
    solution: ammo
  - type: DrainableSolution
    solution: ammo
  - type: SolutionInjectOnProjectileHit
    transferAmount: 0.5
    solution: ammo
  - type: InjectableSolution
    solution: ammo
  - type: SolutionContainerManager
    solutions:
      ammo:
        reagents:
        - ReagentId: TranexamicAcid #Pra parar sangramento
          Quantity: 0.5

