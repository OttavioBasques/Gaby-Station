- type: entity
  id: BulletChesterRifleEMP
  name: bullet (.315 rifle EMP)
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: rubber
      color: "#000f89"
  - type: EmpOnTrigger
    range: 1
    energyConsumption: 75
    disableDuration: 1
  - type: Ammo
    muzzleFlash: null
  - type: PointLight
    radius: 1.5
    color: blue
    energy: 0.5
  - type: Projectile
    damage:
      types:
        Piercing: 10
        Ion: 25

