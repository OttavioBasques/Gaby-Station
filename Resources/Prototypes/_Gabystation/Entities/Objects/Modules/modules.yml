## Head
- type: entity
  parent: BaseItem
  id: ModsuitModuleMedhud
  name: modsuit medhud module
  description: A module that can be inserted inside modsuit helmets to grant the user a medical HUD that displays the health of nearby living creatures.
  components:
  - type: Sprite
    sprite: _Gabystation/Objects/Specific/modsuit_modules.rsi
    state: medhud-head
  - type: GunUpgrade
    name: modsuit-module-medhud-name
  - type: GunUpgradeComponents
    components:
    - type: ShowHealthBars
    - type: ShowHealthIcons
    - type: ShowDiseaseIcons
  - type: Tag
    tags:
    - ModsuitHeadUpgrade

- type: entity
  parent: BaseItem
  id: ModsuitModuleDiagnosticHud
  name: modsuit diagnostic module
  description: A module that can be inserted inside modsuit helmets to grant the user a diagnostic HUD that displays the health of nearby sillicons.
  components:
  - type: Sprite
    sprite: _Gabystation/Objects/Specific/modsuit_modules.rsi
    state: diagnostichud-head
  - type: GunUpgrade
    name: modsuit-module-diagnostichud-name
  - type: GunUpgradeComponents
    components:
    - type: ShowHealthBars
      damageContainers:
      - Inorganic
      - Silicon
      - SiliconRadiation
  - type: Tag
    tags:
    - ModsuitHeadUpgrade

- type: entity
  parent: BaseItem
  id: ModsuitModuleSecHud
  name: modsuit sechud module
  description: A module that can be inserted inside modsuit helmets to grant the user a security HUD that displays the ID status and wanted level of nearby crewmembers.
  components:
  - type: Sprite
    sprite: _Gabystation/Objects/Specific/modsuit_modules.rsi
    state: sechud-head
  - type: GunUpgrade
    name: modsuit-module-sechud-name
  - type: GunUpgradeComponents
    components:
    - type: ShowJobIcons
    - type: ShowMindShieldIcons
    - type: ShowCriminalRecordIcons
    - type: ShowContrabandDetails
  - type: Tag
    tags:
    - ModsuitHeadUpgrade

- type: entity
  parent: BaseItem
  id: ModsuitModuleWelding
  name: modsuit welding module
  description: A module that can be inserted inside modsuit helmets to grant the user welding protection.
  components:
  - type: Sprite
    sprite: _Gabystation/Objects/Specific/modsuit_modules.rsi
    state: welding-head
  - type: GunUpgrade
    name: modsuit-module-welding-name
  - type: GunUpgradeComponents
    components:
    - type: EyeProtection
  - type: Tag
    tags:
    - ModsuitHeadUpgrade

## Chest
- type: entity
  parent: BaseItem
  id: ModsuitModuleAntiGrav
  name: modsuit anti-gravity module
  description: A module that can be inserted inside the chest of a modsuit to negate gravity for the user.
  components:
  - type: Sprite
    sprite: _Gabystation/Objects/Specific/modsuit_modules.rsi
    state: antigrav-chest
  - type: GunUpgrade
    name: modsuit-module-antigrav-name
  - type: GunUpgradeComponents
    components:
    - type: AntiGravityClothing
  - type: Tag
    tags:
    - ModsuitChestUpgrade

- type: entity
  parent: BaseItem
  id: ModsuitModuleGPS
  name: modsuit GPS module
  description: A module that can be inserted inside the chest of a modsuit to grant it GPS functionality.
  components:
  - type: Sprite
    sprite: _Gabystation/Objects/Specific/modsuit_modules.rsi
    state: gps-chest
  - type: GunUpgrade
    name: modsuit-module-gps-name
  - type: GunUpgradeComponents
    components:
    - type: GPS
    - type: ActivatableUI
      key: enum.GpsUiKey.Key
      inHandsOnly: false
      singleUser: false
    - type: UserInterface
      interfaces:
        enum.GpsUiKey.Key:
          type: GpsBoundUserInterface
  - type: Tag
    tags:
    - ModsuitChestUpgrade

