#region Holoflare pistol
- type: entity
  id: NFWeaponHoloflareGun
  parent: BaseItem
  name: holoflare pistol
  description: |-
    A modification of a civilian-grade laser pistol that can project holoflares onto surfaces.
  components:
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Battery/holoflare_pistol.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-2
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
    - state: mode-cyan
      shader: unshaded
      map: [ "Firemode" ]
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
    inhandVisuals:
      left:
      - state: inhand-left
      - state: inhand-left-unshaded
        shader: unshaded
      right:
      - state: inhand-right
      - state: inhand-right-unshaded
        shader: unshaded
  - type: Gun
    selectedMode: SemiAuto
    fireRate: 1
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/flaregun.ogg
    projectileSpeed: 15
  - type: ItemSlots
    slots:
      cell_slot:
        name: Magazine
        startingItem: PowerCellMedium
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
            - PowerCell
            - PowerCellSmall
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: ProjectileBatteryAmmoProvider
    proto: HoloFlareCyan
    fireCost: 240
  - type: EnergyGun
    fireModes:
    - proto: HoloFlareCyan
      fireCost: 240
      state: cyan
    - proto: HoloFlareRed
      fireCost: 240
      state: red
    - proto: HoloFlareYellow
      fireCost: 240
      state: yellow
  - type: MagazineVisuals
    magState: mag
    steps: 3
    zeroVisible: true
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.EnergyGunFireModeVisuals.State:
        Firemode:
          Cyan: { state: mode-cyan }
          Red: { state: mode-red }
          Yellow: { state: mode-yellow }
  - type: PacifismAllowedGun
  - type: StaticPrice
    price: 50
  - type: AltFireMelee
    attackType: Heavy
  - type: AmmoCounter
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 4
        Structural: 8
    angle: 0
    wideAnimationRotation: 90
    soundHit:
      collection: MetalThud
  - type: Multishot
    missChance: 0.4
    spreadMultiplier: 2
    spreadAddition: 40
  - type: Clothing
    sprite: _NF/Objects/Weapons/Guns/Battery/holoflare_pistol.rsi
    quickEquip: false
    slots:
    - Belt
    - suitStorage
  - type: Tag
    tags:
    - Sidearm

- type: entity
  id: NFWeaponHoloflareGunEmpty
  parent: NFWeaponHoloflareGun
  suffix: Empty
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
