- type: entity
  parent: BaseItem
  id: MagazinePulseShotgun
  name: pulse shotgun magazine
  description: Standard EarthGov type of impulse magazines
  components:
  - type: Tag
    tags:
      - MagazinePulseShotgun
  - type: BallisticAmmoProvider
    mayTransfer: true
    capacity: 12
    proto: ShellShotgunPulse
    whitelist:
      tags:
        - ShellShotgunPulse
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Item
    size: Small
    sprite: _Orion/Objects/Weapons/Guns/Ammunition/Magazines/Pulse/batteryMag.rsi
  - type: Sprite
    netsync: false
    sprite: _Orion/Objects/Weapons/Guns/Ammunition/Magazines/Pulse/batteryMag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
