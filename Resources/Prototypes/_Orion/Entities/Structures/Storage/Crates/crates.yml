  name: bitrunning crate
  components:
  - type: Icon
    sprite: _Orion/Structures/Storage/Crates/bitrun_secure.rsi
  - type: Sprite
    sprite: _Orion/Structures/Storage/Crates/bitrun_secure.rsi
