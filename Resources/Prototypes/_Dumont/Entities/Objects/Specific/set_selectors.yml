  parent: [ BaseItem, BaseSetSelector, BaseSecurityContraband ]
  components:
  - type: Sprite
    sprite: _Dumont/Objects/Specific/revolver_selector.rsi
    state: icon
  - type: Item
    sprite: _Dumont/Objects/Specific/revolver_selector.rsi
  - type: SetSelector
    possibleSets:
    - DetectiveInspectorSet
    - DetectiveWatsonSet
    maxSelectedSets: 1
