- type: entity
  id: BaseCartridgeWatson
  name: cartridge (.38 watson)
  parent: [ BaseCartridge, BaseSecurityCommandContraband ]
  abstract: true
  components:
  - type: Tag
    tags:
      - Cartridge
      - CartridgeWatson
  - type: CartridgeAmmo
    proto: BulletWatson
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals

