- type: entity
  id: BaseSpeedLoaderWatson
  name: "speed loader (.38 watson)"
  parent: [ BaseItem, BaseSecurityContraband ]
  abstract: true
  components:
  - type: Tag
    tags:
      - SpeedLoaderWatson
  - type: SpeedLoader
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - CartridgeWatson
    capacity: 8
  - type: Sprite
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []

- type: entity
  id: SpeedLoaderWatson
  name: "speed loader (.38 watson)"
  parent: BaseSpeedLoaderWatson
  description: Designed to quickly refill an empty revolver, it fits up to eight .38 rounds. Intended to hold general-purpose kinetic ammunition.
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeWatson
  - type: Sprite
    sprite: _Dumont/Objects/Weapons/Guns/SpeedLoaders/watson_speed_loader.rsi
    layers:
      - state: base
        map: [ "enum.GunVisualLayers.Base" ]
      - state: base-8
        map: [ "enum.GunVisualLayers.Mag" ]
  - type: MagazineVisuals
    magState: base
    steps: 9
    zeroVisible: false
  - type: Appearance
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-ammo
      right:
      - state: inhand-right-mag
      - state: inhand-right-ammo

- type: entity
  id: SpeedLoaderWatsonEmpty
  name: "speed loader (.38 watson any)"
  parent: SpeedLoaderWatson
  description: Designed to quickly refill an empty revolver, it fits up to eight .38 rounds for the small iron on your hip.
  components:
  - type: BallisticAmmoProvider
    proto: null
  - type: Sprite
    sprite: _Dumont/Objects/Weapons/Guns/SpeedLoaders/watson_speed_loader.rsi
    layers:
      - state: base
        map: [ "enum.GunVisualLayers.Base" ]
      - state: base-8
        map: [ "enum.GunVisualLayers.Mag" ]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag

