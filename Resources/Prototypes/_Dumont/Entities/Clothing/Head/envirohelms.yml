- type: entity
  parent: ClothingHeadEnvirohelmCustomBase
  id: ClothingHeadEnvirohelmBitrunner
  name: bitrunner envirosuit helmet
  description: A sturdy and comfortable envirosuit helmet, handed out to bitrunners so they can enjoy a cozy little rest in the netpod while their brains are gently cooked by a quantum-scale computing technology still under analysis.
  components:
  - type: Sprite
    layers:
    - state: icon
      color: "#39393f"
    - state: accent-icon
      color: "#915d2b"
    - state: visor-icon
    - state: icon-flash
      visible: false
      shader: unshaded
      map: [ "light" ]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#39393f"
      - state: accent-inhand-left
        color: "#915d2b"
      - state: visor-inhand-left
      right:
      - state: inhand-right
        color: "#39393f"
      - state: accent-inhand-right
        color: "#915d2b"
      - state: visor-inhand-right
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-HELMET
        color: "#39393f"
      - state: accent-equipped-HELMET
        color: "#915d2b"
      - state: visor-equipped-HELMET

- type: entity
  parent: ClothingHeadEnvirohelmCustomBase
  id: ClothingHeadEnvirohelmXenonaut
  name: xenonaut envirosuit helmet
  description: Envirosuit helmet using by UEG marine corp.
  components:
  - type: Sprite
    layers:
    - state: icon
      color: "#666666"
    - state: accent-icon
      color: "#424242"
    - state: visor-icon
    - state: icon-flash
      visible: false
      shader: unshaded
      map: [ "light" ]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#666666"
      - state: accent-inhand-left
        color: "#424242"
      - state: visor-inhand-left
      right:
      - state: inhand-right
        color: "#666666"
      - state: accent-inhand-right
        color: "#424242"
      - state: visor-inhand-right
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-HELMET
        color: "#666666"
      - state: accent-equipped-HELMET
        color: "#424242"
      - state: visor-equipped-HELMET
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.5
        Slash: 0.5
        Piercing: 0.4
        Heat: 0.8
        Radiation: 0.8
        Caustic: 0.95
  - type: ExplosionResistance
    damageCoefficient: 0.75

- type: entity
  parent: ClothingHeadEnvirohelmCustomBase
  id: ClothingHeadEnvirohelmERTSecurity
  name: ERT security envirosuit helmet
  description: An in-atmosphere envirosuit helmet worn by security members of the Nanotrasen Emergency Response Team. Has red highlights.
  components:
  - type: Sprite
    layers:
    - state: icon
      color: "#4c4c4c"
    - state: accent-icon
      color: "#7f0000"
    - state: visor-icon
    - state: icon-flash
      visible: false
      shader: unshaded
      map: [ "light" ]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#4c4c4c"
      - state: accent-inhand-left
        color: "#7f0000"
      - state: visor-inhand-left
      right:
      - state: inhand-right
        color: "#4c4c4c"
      - state: accent-inhand-right
        color: "#7f0000"
      - state: visor-inhand-right
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-HELMET
        color: "#4c4c4c"
      - state: accent-equipped-HELMET
        color: "#7f0000"
      - state: visor-equipped-HELMET
  - type: Armor
    coverage:
    - Head
    traumaDeductions:
      Dismemberment: 0.2
      OrganDamage: 0.2
      BoneDamage: 0.2
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.7
        Slash: 0.7
        Piercing: 0.7
        Heat: 0.8
