- type: entity
  parent: ClothingUniformEnvirosuitCustomBase
  id: ClothingUniformEnvirosuitBitrunner
  name: bitrunner envirosuit
  description: A sturdy and comfortable envirosuit, handed out to bitrunners so they can enjoy a cozy little rest in the netpod while their brains are gently cooked by a quantum-scale computing technology still under analysis.
  components:
  - type: Sprite
    layers:
    - state: icon
      color: "#39393f"
    - state: plaintop-icon
      color: "#39393f"
    - state: accent2-icon
      color: "#915d2b"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#39393f"
      - state: accent2-inhand-left
        color: "#915d2b"
      right:
      - state: inhand-right
        color: "#39393f"
      - state: accent2-inhand-right
        color: "#915d2b"
  - type: Clothing
    clothingVisuals:
      jumpsuit:
      - state: equipped-INNERCLOTHING
        color: "#39393f"
      - state: accent2-equipped-INNERCLOTHING
        color: "#915d2b"
      - state: soles-equipped-INNERCLOTHING
        color: "#794421"

