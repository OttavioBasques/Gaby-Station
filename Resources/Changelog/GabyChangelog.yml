- author: Kyoth25f
  changes:
    - type: Add
      message: >-
        Nova rede de gases bluespace. Use o transmissor de gás de bluespace para
        adicionar gases a rede e a máquina de venda de gás de bluespace para
        encher tanques com os gases da rede. Conecte as máquinas com uma
        multiferramenta.
    - type: Add
      message: >-
        Nova máquina: o cristalizador. Em condições ideais, transforme
        substâncias gasosas em cristais. Variados preços e várias
        funcionalidades, só tome cuidado pra não derrubar...
    - type: Add
      message: >-
        O Reator de Fusão Hypertorus é um novo gerador de energia. Além de gerar
        energia, ele proporciona um ambiente interno ótimo para reações mais
        controladas e de maior eficiência. Mas, tenha cuidado! Assim como a
        Supermatter, qualquer descuido pode levar na destruição massiva do
        Departamento de Engenharia.
    - type: Add
      message: >-
        Tanto o reator como o cristalizador dependem de condições ótimas, para
        ajudar a chegar nelas, a NanoTrasen lançou novos modelos de máquinas
        térmicas (aquecedores e resfriados).
    - type: Add
      message: >-
        Os gases hidrogênio, hyper-nobium, proto-nitrate, zauker, halon e
        anti-noblium foram adicionados.
    - type: Tweak
      message: >-
        As entradas de gases e máquinas térmicas do livro guia foram
        atualizadas!
    - type: Add
      message: >-
        Pesquisas que contemplam as novas máquinas da Atmosfera foram
        adicionadas.
    - type: Add
      message: >-
        O eletrolisador foi adicionado. Em uma atmosfera livre, ele proporciona
        a quebra das móleculas a custo de energia elétrica. Qual a fórmula da
        agua, ou melhor, do vapor mesmo?
    - type: Tweak
      message: >-
        As receitas das máquinas térmicas comuns não estão mais trancadas por
        pesquisa e usam urânio ao invés de ouro. "Cargoo? Cade os minérios?"
  id: 47
  time: '2025-06-23T23:23:11.0000000+00:00'
